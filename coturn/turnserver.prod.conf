listening-port=3478
tls-listening-port=5349

# IMPORTANT: Replace with your server's public IP
external-ip=REPLACE_WITH_PUBLIC_IP

fingerprint
lt-cred-mech
use-auth-secret

# Must match TURN_SECRET in .env.prod
static-auth-secret=REPLACE_WITH_TURN_SECRET

# Replace with your domain
realm=REPLACE_WITH_DOMAIN

simple-log
min-port=49152
max-port=65535

# Security
no-multicast-peers
no-cli
