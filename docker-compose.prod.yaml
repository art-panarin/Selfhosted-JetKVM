name: jetkvm-cloud

networks:
  jetkvm:
    driver: bridge

services:
  # === PostgreSQL ===
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: jetkvm
      POSTGRES_DB: jetkvm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jetkvm -d jetkvm"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - jetkvm
    volumes:
      - postgresql:/var/lib/postgresql/data

  # === Database migrations ===
  app-migrate:
    image: jetkvm-cloud:latest
    build:
      context: ..
      dockerfile: Cloud-API_Dev/Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgres://jetkvm:${DB_PASSWORD}@db:5432/jetkvm
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy"]
    networks:
      - jetkvm
    restart: "no"

  # === Cloud API + UI ===
  app:
    image: jetkvm-cloud:latest
    build:
      context: ..
      dockerfile: Cloud-API_Dev/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      PORT: 3000
      DATABASE_URL: postgres://jetkvm:${DB_PASSWORD}@db:5432/jetkvm
    depends_on:
      db:
        condition: service_healthy
      app-migrate:
        condition: service_completed_successfully
    networks:
      - jetkvm
    # No ports exposed — Caddy handles external traffic

  # === TURN server (coturn) ===
  turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.prod.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

  # === Reverse proxy with automatic HTTPS ===
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - jetkvm
    depends_on:
      - app

volumes:
  postgresql:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
