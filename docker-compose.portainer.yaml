name: jetkvm-cloud

# =====================================================================
# JetKVM Cloud — Portainer deployment stack (GHCR)
#
# Используется при деплое через Portainer (Stacks → Repository).
# Docker-образ тянется напрямую из GitHub Container Registry —
# никаких init-сервисов, никаких файлов на диске сервера.
#
# Обязательные env-переменные стека (Portainer → Environment variables,
# см. ReadGH.me раздел 3.3):
#
#   --- секреты приложения ---
#   DOMAIN           — доменное имя сайта (kvm.example.com)
#   TURN_HOST        — публичный IP сервера (для coturn external-ip)
#   DB_PASSWORD      — openssl rand -hex 16
#   COOKIE_SECRET    — openssl rand -hex 32
#   JWT_SECRET       — openssl rand -hex 32
#   TURN_SECRET      — openssl rand -hex 32
#
#   --- источник Docker-образа ---
#   GHCR_IMAGE       — полный путь к образу, например:
#                      ghcr.io/ivanov/jetkvm-cloud:v0.1.001
#
#   --- опциональные ---
#   ALLOWED_IDENTITIES — список email через запятую для ограничения регистрации
#   R2_*             — параметры S3-совместимого хранилища для прошивок
#
# Если репозиторий с образом private — добавьте GHCR как Registry в
# Portainer (Registries → Add registry → GitHub) до создания стека.
# =====================================================================

# ── YAML-якорь: общий блок env-переменных для app и app-migrate ───────
x-app-env: &app-env
  NODE_ENV:             production
  PORT:                 "3000"
  DOMAIN:               ${DOMAIN}
  API_HOSTNAME:         https://${DOMAIN}
  APP_HOSTNAME:         https://${DOMAIN}
  DATABASE_URL:         postgresql://jetkvm:${DB_PASSWORD}@db:5432/jetkvm?schema=public
  DB_PASSWORD:          ${DB_PASSWORD}
  COOKIE_SECRET:        ${COOKIE_SECRET}
  JWT_SECRET:           ${JWT_SECRET}
  TURN_SECRET:          ${TURN_SECRET}
  TURN_HOST:            ${TURN_HOST}
  TURN_PORT:            "3478"
  ICE_SERVERS:          stun:stun.l.google.com:19302
  CORS_ORIGINS:         https://${DOMAIN}
  REAL_IP_HEADER:       X-Forwarded-For
  ALLOWED_IDENTITIES:   ${ALLOWED_IDENTITIES:-}
  R2_ENDPOINT:          ${R2_ENDPOINT:-}
  R2_ACCESS_KEY_ID:     ${R2_ACCESS_KEY_ID:-}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
  R2_BUCKET:            ${R2_BUCKET:-}
  R2_CDN_URL:           ${R2_CDN_URL:-}

networks:
  jetkvm:
    driver: bridge

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: jetkvm
      POSTGRES_DB: jetkvm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jetkvm -d jetkvm"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - jetkvm
    volumes:
      - postgresql:/var/lib/postgresql/data

  # ── Database migrations (одноразовый) ─────────────────────────────────
  app-migrate:
    image: ${GHCR_IMAGE}
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy"]
    networks:
      - jetkvm
    restart: "no"

  # ── Cloud API + UI ────────────────────────────────────────────────────
  app:
    image: ${GHCR_IMAGE}
    restart: unless-stopped
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
      app-migrate:
        condition: service_completed_successfully
    networks:
      - jetkvm

  # ── TURN server (coturn) ──────────────────────────────────────────────
  # Конфигурация через CLI-аргументы, чтобы не зависеть от файла на диске.
  # Все параметры подставляются из env-переменных Portainer.
  turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command:
      - "-n"  # отключить чтение /etc/coturn/turnserver.conf
      - "--listening-port=3478"
      - "--tls-listening-port=5349"
      - "--external-ip=${TURN_HOST}"
      - "--fingerprint"
      - "--lt-cred-mech"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET}"
      - "--realm=${DOMAIN}"
      - "--simple-log"
      - "--min-port=49152"
      - "--max-port=65535"
      - "--no-multicast-peers"
      - "--no-cli"

  # ── Reverse proxy (Caddy + Let's Encrypt) ─────────────────────────────
  # Caddyfile встроен в compose через configs: — не зависит от внешнего файла.
  # Compose сам подставит ${DOMAIN} из env Portainer в текст Caddyfile.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
        mode: 0644
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - jetkvm
    depends_on:
      - app

configs:
  caddyfile:
    content: |
      ${DOMAIN} {
          reverse_proxy app:3000
      }

volumes:
  postgresql:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
